<body>

  <script type="text/babel" src="design-canvas.jsx"></script>

  <!-- ============ THEME A — CRT / Y2K (baseline, current site) ============ -->
  <script type="text/babel">

        <div className="theme-ab theme-crt" style={crtStyles.shell}>

              border: 1px solid #444; border-bottom: none;

              letter-spacing: 0.04em; text-transform: uppercase; }

            .theme-crt .tabs { display: flex; padding: 0 8px; background: #0c0c0c;
              border: 1px solid #444; border-top: none; border-bottom: none; }
            .theme-crt .tab { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
              color: #6a6a6a; padding: 10px 14px; letter-spacing: 0.08em; text-transform: uppercase; }

            .theme-crt .kicker { font-family: 'IBM Plex Mono', monospace; font-size: 11px;
              color: #6a6a6a; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 14px; }
            .theme-crt h1 { font-family: 'VT323', monospace; font-size: 80px; line-height: 1.05;

            <span className="dot" style={{background:'#FFB300'}}></span>
            <span className="dot" style={{background:'#39FF14'}}></span>
            <span style={{marginLeft:6}}>~/portfolio — terminal</span>
            <span style={{flex:1}}></span>
            <span>SESSION 0x7F3A · 14:22:08 SGT</span>
          </div>
          <div className="tabs">
            <span className="tab on">/ HOME</span>
            <span className="tab">/ WORK</span>
            <span className="tab">/ PROJECTS</span>
            <span className="tab">/ SYSTEMS</span>
            <span className="tab">/ ABOUT</span>

          <div className="frame">

                </div>

            </div>
          </div>

    const crtStyles = { shell: { width: '100%', height: '100%', overflow: 'hidden' } };
    window.ThemeCRT = ThemeCRT;
  </script>

            .theme-brut .card h3 { font-family: 'Space Grotesk', sans-serif; font-weight: 700;
