<script>
// Tame ResizeObserver "loop completed" noise — well-known harmless warning.
(function(){
  const RO = window.ResizeObserver;
  if (RO) {
    window.ResizeObserver = class extends RO {
      constructor(cb){ super((es, ob) => { requestAnimationFrame(() => cb(es, ob)); }); }
    };
  }
  const orig = console.error;
  console.error = function(){
    const a = arguments[0];
    if (typeof a === 'string' && /ResizeObserver loop/.test(a)) return;
    if (a && a.message && /ResizeObserver loop/.test(a.message)) return;
    return orig.apply(console, arguments);
  };
  window.addEventListener('error', e => {
    if (e && e.message && /ResizeObserver loop/.test(e.message)) {
      e.stopImmediatePropagation();
      e.preventDefault();
      return false;
    }
  }, true);
})();
</script>
