name: Deploy showcase site to GitHub Pages

# Publishes site/ as the site root, with data/portfolio.json copied alongside
# so the page can fetch ./data/portfolio.json. Runs on changes to the site or
# the portfolio data on the default branch; can also be triggered manually.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/portfolio.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble publish directory
        run: |
          mkdir -p _site/data
          cp -r site/* _site/
          cp data/portfolio.json _site/data/portfolio.json

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
